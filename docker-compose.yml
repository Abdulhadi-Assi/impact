services:

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: impact
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P4ssword!
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d impact"]
      interval: 5s
      timeout: 5s
      retries: 10
    network_mode: "service:localhost"

  pgadmin:
    image: dpage/pgadmin4:9.1.0
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    restart: unless-stopped
    depends_on:
      - postgresql
    network_mode: "service:localhost"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_DB: postgres
      KC_DB_URL_HOST: localhost
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_DB_SCHEMA: public
      KC_HTTP_PORT: 9098
      KC_HTTPS_PORT: 9098
    volumes:
      - keycloak:/opt/keycloak/data
      - ./keycloak/imports:/opt/keycloak/data/import
    depends_on:
      postgresql:
        condition: service_healthy
    network_mode: "service:localhost"

  impact-app:
    build: .
    depends_on:
      - postgresql
      - keycloak
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/impact
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: P4ssword!
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KEYCLOAK_AUTH_SERVER_URL: http://localhost:9098
      KEYCLOAK_CLIENT_SECRET: my-spring-client-secret
      SWAGGER_AUTH_SERVER_URL: http://localhost:9098
    network_mode: "service:localhost"


  localhost:
    image: alpine:3.14
    command: sleep infinity
    ports:
      - "9098:9098" # Keycloak port
      - "8080:8080" # spring boot
      - "5432:5432"  # PostgreSQL
      - "5050:80"    # pgAdmin
volumes:
  postgres:
  pgadmin:
  keycloak: