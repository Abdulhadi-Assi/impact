services:

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: impact
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: P4ssword!
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: "exit 0"
    ports:
      - "5433:5432"
    networks:
        - impact


  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:9.1.0
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin4@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin:/var/lib/pgadmin
    restart: unless-stopped
    depends_on:
      - postgresql
    networks:
      - impact
    ports:
      - "5050:80"


  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_DB: postgres
      KC_DB_URL_HOST: postgresql
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_DB_SCHEMA: public
      KC_HTTP_PORT: 9098
      KC_HTTPS_PORT: 9098
    volumes:
      - keycloak:/opt/keycloak/data
      - ./keycloak/imports:/opt/keycloak/data/import
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "9098:9098"
    networks:
      - impact

  impact-app:
    build: .
    container_name: impact-app
    depends_on:
      - postgresql
      - keycloak
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/impact
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: P4ssword!
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      KEYCLOAK_AUTH_SERVER_URL: http://keyclaok:9098
      KEYCLOAK_CLIENT_SECRET: my-spring-client-secret
      SWAGGER_AUTH_SERVER_URL: http://localhost:9098
    networks:
      - impact
    ports:
      - "8080:8080"

volumes:
  postgres:
  pgadmin:
  keycloak:

networks:
  impact:
    driver: bridge